<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - InmoAsistente</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f3f4f6;
            color: #111827;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
        }
        h1 { font-size: 1.5rem; margin-bottom: 20px; color: #4f46e5; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 5px; color: #475569; }
        input, textarea {
            width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 0.95rem; outline: none;
        }
        textarea { height: 120px; resize: none; }
        button {
            width: 100%; background: #4f46e5; color: white; border: none; padding: 12px;
            border-radius: 8px; font-weight: 700; font-size: 1rem; cursor: pointer; margin-top: 10px;
        }
        button:hover { background: #4338ca; }
        .result-box {
            margin-top: 20px; padding: 15px; background: #ecfdf5; border: 1px solid #a7f3d0;
            border-radius: 8px; color: #065f46; display: none; word-break: break-all;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📝 Cargar Nueva Propiedad</h1>
    
    <div class="form-group">
        <label>Dirección del Inmueble</label>
        <input type="text" id="direccion" placeholder="Ej: Cuyo 677, Bahía Blanca">
    </div>
    
    <div class="form-group">
        <label>Precio de Alquiler ($)</label>
        <input type="number" id="precio" placeholder="Ej: 60000">
    </div>
    
    <div class="form-group">
        <label>Gastos de Expensas ($)</label>
        <input type="number" id="expensas" placeholder="Ej: 31000">
    </div>
    
    <div class="form-group">
        <label>Descripción Completa y Condiciones (Lo que leerá la IA)</label>
        <textarea id="descripcion" placeholder="Ej: Departamento de 1 dormitorio, luminoso. No acepta mascotas. Requisitos: recibo de sueldo y dos garantías..."></textarea>
    </div>
    
    <button onclick="enviarPropiedad()">Guardar y Generar Link</button>
    
    <div id="result" class="result-box"></div>
</div>

<script>
    async function enviarPropiedad() {
        const direccion = document.getElementById('direccion').value.trim();
        const precio = parseFloat(document.getElementById('precio').value);
        const expensas = parseFloat(document.getElementById('expensas').value);
        const descripcion_completa = document.getElementById('descripcion').value.trim();

        if(!direccion || !precio || !descripcion_completa) {
            alert("Por favor, completa los campos obligatorios.");
            return;
        }

        try {
            // CONECTADO EN DIRECTO A TU RENDER GLOBALLY
            const response = await fetch('https://inmo-asistente-ia.onrender.com/api/propiedades', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ direccion, precio, expensas: expensas || 0, descripcion_completa })
            });

            if(!response.ok) throw new Error("Error al guardar en el servidor");
            
            const data = await response.json();
            
            const resultBox = document.getElementById('result');
            // Genera el link apuntando a tu demo local pero con el ID real guardado en Render
            resultBox.innerHTML = `<strong>¡Propiedad guardada con éxito en la nube!</strong><br><br>Link para enviarle al cliente:<br><a href="demo.html?id=${data.id}" target="_blank">demo.html?id=${data.id}</a>`;
            resultBox.style.display = 'block';

            // Limpiar formulario
            document.getElementById('direccion').value = '';
            document.getElementById('precio').value = '';
            document.getElementById('expensas').value = '';
            document.getElementById('descripcion').value = '';

        } catch (error) {
            console.error(error);
            alert("Hubo un error al conectar con el servidor en Render.");
        }
    }
</script>
</body>
</html>
