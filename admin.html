<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración - InmoAsistente</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: #ffffff;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 550px;
        }

        h2 {
            color: #4338ca;
            margin-bottom: 24px;
            font-size: 24px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #374151;
            font-weight: 500;
            font-size: 14px;
        }

        input[type="text"], input[type="number"], textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 15px;
            color: #1f2937;
            background-color: #f9fafb;
            transition: all 0.3s ease;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #4338ca;
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(67, 56, 202, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        button {
            width: 100%;
            background-color: #4338ca;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: #3730a3;
        }

        .resultado-box {
            margin-top: 24px;
            padding: 16px;
            border-radius: 8px;
            display: none;
        }

        .success {
            background-color: #ecfdf5;
            border: 1px solid #a7f3d0;
            color: #065f46;
        }

        .error {
            background-color: #fef2f2;
            border: 1px solid #fecaca;
            color: #991b1b;
        }

        .resultado-box a {
            color: #4338ca;
            font-weight: 600;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>📝 Cargar Nueva Propiedad</h2>
        
        <form id="propiedadForm">
            <div class="form-group">
                <label for="direccion">Dirección del Inmueble</label>
                <input type="text" id="direccion" placeholder="Ej: Cuyo 677, Bahía Blanca" required>
            </div>

            <div class="form-group">
                <label for="precio">Precio de Alquiler ($)</label>
                <input type="number" id="precio" placeholder="Ej: 60000" required>
            </div>

            <div class="form-group">
                <label for="expensas">Gastos de Expensas ($)</label>
                <input type="number" id="expensas" placeholder="Ej: 31000" required>
            </div>

            <div class="form-group">
                <label for="descripcion">Descripción Completa y Condiciones (Lo que leerá la IA)</label>
                <textarea id="descripcion" placeholder="Ej: Departamento de 1 dormitorio, luminoso. No acepta mascotas. Requisitos: recibo de sueldo y dos garantías..." required></textarea>
            </div>

            <button type="submit">Guardar y Generar Link</button>
        </form>

        <div id="resultado" class="resultado-box"></div>
    </div>

    <script>
        document.getElementById("propiedadForm").addEventListener("submit", async function(event) {
            event.preventDefault();

            const resultadoDiv = document.getElementById("resultado");
            resultadoDiv.style.display = "none";

            const propiedad = {
                direccion: document.getElementById("direccion").value,
                precio: parseFloat(document.getElementById("precio").value),
                expensas: parseFloat(document.getElementById("expensas").value),
                descripcion: document.getElementById("descripcion").value
            };

            try {
                // 🚀 URL directa a tu backend en producción
                const response = await fetch("https://inmo-asistente-ia.onrender.com/api/propiedades", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(propiedad)
                });

                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    throw new Error(errorData.detail || "Error interno del servidor");
                }

                const data = await response.json();

                // Armamos el link apuntando a tu GitHub Pages con el ID devuelto por Supabase
                const urlCliente = `https://andymoore0.github.io/inmo-asistente-ia/demo.html?id=${data.id}`;

                resultadoDiv.className = "resultado-box success";
                resultadoDiv.innerHTML = `
                    <strong>¡Propiedad guardada con éxito en la nube!</strong><br><br>
                    Link para enviarle al cliente:<br>
                    <a href="${urlCliente}" target="_blank">${urlCliente}</a>
                `;
                resultadoDiv.style.display = "block";

                // Limpiar el formulario
                document.getElementById("propiedadForm").reset();

            } catch (error) {
                console.error("Error completo en la petición:", error);
                resultadoDiv.className = "resultado-box error";
                resultadoDiv.innerHTML = `<strong>Error:</strong> No se pudo conectar con el servidor de Render. Asegurate de que el backend esté activo e intentalo de nuevo.`;
                resultadoDiv.style.display = "block";
            }
        });
    </script>
</body>
</html>
